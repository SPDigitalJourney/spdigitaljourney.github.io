<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status 4 - Game Changer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }
        
        .status-container {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }
        
        .bg-circles {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .c1 { width: 500px; height: 500px; top: 10%; left: -10%; }
        .c2 { width: 700px; height: 700px; bottom: -15%; right: -15%; }
        .c3 { width: 300px; height: 300px; top: 40%; right: 5%; }
        
        .content {
            text-align: center;
            z-index: 10;
            color: white;
        }
        
        .badge {
            background: #ffd700;
            color: #2d3436;
            padding: 25px 60px;
            border-radius: 50px;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 60px;
            display: inline-block;
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.4);
        }
        
        .badge::before {
            content: '🎯 ';
            font-size: 56px;
        }
        
        .title {
            font-size: 88px;
            font-weight: 900;
            margin-bottom: 90px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .integration-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 70px;
            border-radius: 30px;
            margin: 40px 0;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            font-size: 50px;
            color: #2d3436;
            margin-bottom: 50px;
            font-weight: 700;
        }
        
        .platform {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 45px;
            padding: 35px 40px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.3);
        }
        
        .platform-name {
            display: flex;
            align-items: center;
            font-size: 48px;
            color: white;
            font-weight: 700;
        }
        
        .platform-name::before {
            margin-right: 25px;
            font-size: 56px;
        }
        
        .whatsapp-p::before { content: '📱'; }
        .facebook-p::before { content: '📘'; }
        .instagram-p::before { content: '📸'; }
        .youtube-p::before { content: '▶️'; }
        
        .platform-benefit {
            font-size: 36px;
            color: white;
            font-weight: 500;
        }
        
        .cta {
            font-size: 72px;
            font-weight: 900;
            margin-top: 80px;
            line-height: 1.3;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .highlight {
            color: #ffd700;
            text-decoration: underline;
            text-decoration-thickness: 6px;
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="bg-circles">
            <div class="circle c1"></div>
            <div class="circle c2"></div>
            <div class="circle c3"></div>
        </div>
        
        <div class="content">
            <div class="badge">Game Changer Alert!</div>
            
            <div class="title">
                Connect Your<br>Google Business Profile
            </div>
            
            <div class="integration-box">
                <div class="subtitle">with these platforms:</div>
                
                <div class="platform">
                    <div class="platform-name whatsapp-p">WhatsApp</div>
                    <div class="platform-benefit">Instant queries</div>
                </div>
                
                <div class="platform">
                    <div class="platform-name facebook-p">Facebook</div>
                    <div class="platform-benefit">Broader reach</div>
                </div>
                
                <div class="platform">
                    <div class="platform-name instagram-p">Instagram</div>
                    <div class="platform-benefit">Visual story</div>
                </div>
                
                <div class="platform">
                    <div class="platform-name youtube-p">YouTube</div>
                    <div class="platform-benefit">Video content</div>
                </div>
            </div>
            
            <div class="cta">
                <span class="highlight">ONE</span> profile<br>
                <span class="highlight">ALL</span> platforms<br>
                <span class="highlight">MAXIMUM</span> visibility!
            </div>
        </div>
    </div>
</body>
</html>

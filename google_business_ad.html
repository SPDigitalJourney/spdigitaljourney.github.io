<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Business Profile Ad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }
        
        .status-container {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }
        
        /* Animated background elements */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
        }
        
        .circle-1 {
            width: 600px;
            height: 600px;
            background: white;
            top: -200px;
            left: -200px;
        }
        
        .circle-2 {
            width: 800px;
            height: 800px;
            background: white;
            bottom: -300px;
            right: -300px;
        }
        
        .circle-3 {
            width: 400px;
            height: 400px;
            background: white;
            top: 50%;
            right: -100px;
        }
        
        /* Alert icon */
        .alert-icon {
            width: 180px;
            height: 180px;
            background: #ff4757;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 60px;
            box-shadow: 0 20px 60px rgba(255, 71, 87, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 20px 60px rgba(255, 71, 87, 0.4);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 20px 80px rgba(255, 71, 87, 0.6);
            }
        }
        
        .alert-icon::before {
            content: '🚨';
            font-size: 90px;
        }
        
        /* Main content */
        .content {
            text-align: center;
            z-index: 10;
            color: white;
        }
        
        .headline {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 50px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: -1px;
        }
        
        .stat-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 80px;
            border-radius: 30px;
            margin: 60px 0;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
        }
        
        .stat-number {
            font-size: 160px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 30px;
        }
        
        .stat-text {
            font-size: 48px;
            color: #2d3436;
            font-weight: 600;
            line-height: 1.4;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .question {
            font-size: 56px;
            font-weight: 700;
            margin-top: 80px;
            line-height: 1.3;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .highlight {
            color: #ffd700;
            text-decoration: underline;
            text-decoration-thickness: 4px;
            text-underline-offset: 8px;
        }
        
        .hashtags {
            margin-top: 100px;
            font-size: 36px;
            opacity: 0.9;
            font-weight: 500;
            letter-spacing: 1px;
        }
        
        /* Google colors accent */
        .google-dots {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 60px;
        }
        
        .dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }
        
        .dot-blue { background: #4285f4; }
        .dot-red { background: #ea4335; }
        .dot-yellow { background: #fbbc04; }
        .dot-green { background: #34a853; }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="bg-circle circle-1"></div>
        <div class="bg-circle circle-2"></div>
        <div class="bg-circle circle-3"></div>
        
        <div class="content">
            <div class="alert-icon"></div>
            
            <div class="headline">
                Did you know?
            </div>
            
            <div class="stat-box">
                <div class="stat-number">73%</div>
                <div class="stat-text">
                    of customers lose trust in businesses with incomplete Google profiles
                </div>
            </div>
            
            <div class="question">
                Is <span class="highlight">YOUR</span> business<br>
                losing customers<br>
                before they even<br>
                contact you?
            </div>
            
            <div class="google-dots">
                <div class="dot dot-blue"></div>
                <div class="dot dot-red"></div>
                <div class="dot dot-yellow"></div>
                <div class="dot dot-green"></div>
            </div>
            
            <div class="hashtags">
                #GoogleBusiness #DigitalPresence
            </div>
        </div>
    </div>
</body>
</html>

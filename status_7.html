<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status 7 - Action Plan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }
        
        .status-container {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }
        
        .content {
            z-index: 10;
            width: 100%;
            color: white;
        }
        
        .header {
            text-align: center;
            margin-bottom: 70px;
        }
        
        .badge {
            background: #ffd700;
            color: #2d3436;
            padding: 25px 60px;
            border-radius: 50px;
            font-size: 48px;
            font-weight: 900;
            display: inline-block;
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.4);
        }
        
        .badge::before {
            content: '✅ ';
            font-size: 56px;
        }
        
        .title {
            font-size: 88px;
            font-weight: 900;
            margin-top: 40px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .time-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px 50px;
            border-radius: 40px;
            font-size: 44px;
            font-weight: 700;
            margin-top: 30px;
        }
        
        .steps-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 70px;
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
        }
        
        .step {
            display: flex;
            align-items: center;
            margin-bottom: 45px;
            padding: 40px;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(106, 17, 203, 0.3);
        }
        
        .step:last-child {
            margin-bottom: 0;
        }
        
        .step-number {
            font-size: 80px;
            font-weight: 900;
            color: white;
            margin-right: 35px;
            min-width: 100px;
        }
        
        .step-text {
            font-size: 44px;
            color: white;
            font-weight: 600;
            line-height: 1.3;
        }
        
        .cta {
            text-align: center;
            margin-top: 70px;
        }
        
        .cta-text {
            font-size: 58px;
            font-weight: 700;
            margin-bottom: 30px;
        }
        
        .cta-action {
            background: #ffd700;
            color: #2d3436;
            padding: 35px 70px;
            border-radius: 50px;
            font-size: 52px;
            font-weight: 900;
            display: inline-block;
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.4);
        }
        
        .cta-action::after {
            content: ' 💬';
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="content">
            <div class="header">
                <div class="badge">Your Action Plan</div>
                <div class="title">Get Started Now!</div>
                <div class="time-badge">⏱️ Takes only 5 minutes</div>
            </div>
            
            <div class="steps-container">
                <div class="step">
                    <div class="step-number">1️⃣</div>
                    <div class="step-text">Open Google Business Profile</div>
                </div>
                
                <div class="step">
                    <div class="step-number">2️⃣</div>
                    <div class="step-text">Click "Edit Profile"</div>
                </div>
                
                <div class="step">
                    <div class="step-number">3️⃣</div>
                    <div class="step-text">Add all social media links</div>
                </div>
                
                <div class="step">
                    <div class="step-number">4️⃣</div>
                    <div class="step-text">Enable WhatsApp messaging</div>
                </div>
                
                <div class="step">
                    <div class="step-number">5️⃣</div>
                    <div class="step-text">Update regularly with posts</div>
                </div>
            </div>
            
            <div class="cta">
                <div class="cta-text">Simple. Powerful. Essential.</div>
                <div class="cta-action">Need help? DM me!</div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status 3 - Reality Check</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }
        
        .status-container {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }
        
        .content {
            z-index: 10;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 70px;
        }
        
        .badge {
            background: white;
            color: #fa709a;
            padding: 25px 60px;
            border-radius: 50px;
            font-size: 56px;
            font-weight: 900;
            display: inline-block;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        
        .badge::before {
            content: '💡 ';
        }
        
        .comparison {
            display: flex;
            gap: 40px;
            margin-bottom: 80px;
        }
        
        .column {
            flex: 1;
            background: white;
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        }
        
        .column-header {
            text-align: center;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 5px solid;
        }
        
        .competitor .column-header {
            color: #00b894;
            border-color: #00b894;
        }
        
        .yours .column-header {
            color: #d63031;
            border-color: #d63031;
        }
        
        .feature {
            display: flex;
            align-items: flex-start;
            font-size: 38px;
            margin-bottom: 30px;
            font-weight: 500;
            color: #2d3436;
            line-height: 1.3;
        }
        
        .feature::before {
            margin-right: 20px;
            flex-shrink: 0;
            font-size: 44px;
        }
        
        .competitor .feature::before {
            content: '✅';
        }
        
        .yours .feature::before {
            content: '❌';
        }
        
        .address-only {
            font-size: 40px;
            color: #636e72;
            font-style: italic;
            text-align: center;
            margin-top: 40px;
        }
        
        .question {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        }
        
        .question-text {
            font-size: 58px;
            font-weight: 900;
            color: #2d3436;
            line-height: 1.3;
        }
        
        .highlight {
            color: #fa709a;
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="content">
            <div class="header">
                <div class="badge">Reality Check</div>
            </div>
            
            <div class="comparison">
                <div class="column competitor">
                    <div class="column-header">Your Competitor</div>
                    <div class="feature">All social media links</div>
                    <div class="feature">Active WhatsApp chat</div>
                    <div class="feature">Recent posts & updates</div>
                    <div class="feature">Customer reviews</div>
                </div>
                
                <div class="column yours">
                    <div class="column-header">Your Profile</div>
                    <div class="feature">No social links</div>
                    <div class="feature">No chat option</div>
                    <div class="feature">No updates</div>
                    <div class="feature">Limited info</div>
                    <div class="address-only">...just an address</div>
                </div>
            </div>
            
            <div class="question">
                <div class="question-text">
                    Who do you think<br>
                    customers will<br>
                    <span class="highlight">CHOOSE?</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

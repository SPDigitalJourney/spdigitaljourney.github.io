<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status 10 - WhatsApp Magic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }
        
        .status-container {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }
        
        .bg-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.08;
            background-image: 
                radial-gradient(circle at 20% 30%, white 2px, transparent 2px),
                radial-gradient(circle at 80% 70%, white 2px, transparent 2px);
            background-size: 100px 100px;
        }
        
        .content {
            text-align: center;
            z-index: 10;
            color: white;
        }
        
        .icons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-bottom: 60px;
        }
        
        .icon {
            font-size: 160px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .plus {
            font-size: 100px;
            font-weight: 900;
        }
        
        .equals {
            font-size: 100px;
            font-weight: 900;
            margin: 40px 0;
        }
        
        .magic {
            font-size: 120px;
        }
        
        .title {
            font-size: 88px;
            font-weight: 900;
            margin-bottom: 80px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .benefits-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 70px;
            border-radius: 30px;
            margin: 40px 0;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
        }
        
        .benefits-title {
            font-size: 52px;
            color: #2d3436;
            margin-bottom: 50px;
            font-weight: 700;
        }
        
        .benefit {
            display: flex;
            align-items: flex-start;
            margin-bottom: 40px;
            padding: 35px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
        }
        
        .benefit:last-child {
            margin-bottom: 0;
        }
        
        .benefit::before {
            content: '✨';
            font-size: 50px;
            margin-right: 25px;
            flex-shrink: 0;
        }
        
        .benefit-text {
            font-size: 42px;
            color: white;
            font-weight: 600;
            line-height: 1.4;
        }
        
        .question {
            font-size: 60px;
            font-weight: 700;
            margin-top: 70px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="bg-pattern"></div>
        
        <div class="content">
            <div class="icons">
                <div class="icon">📱</div>
                <div class="plus">+</div>
                <div class="icon">🔍</div>
            </div>
            
            <div class="equals">=</div>
            <div class="magic">✨ MAGIC! ✨</div>
            
            <div class="title">
                WhatsApp + Google
            </div>
            
            <div class="benefits-box">
                <div class="benefits-title">When you add WhatsApp to your Google profile:</div>
                
                <div class="benefit">
                    <div class="benefit-text">Customers click to chat instantly</div>
                </div>
                
                <div class="benefit">
                    <div class="benefit-text">No need to save phone numbers</div>
                </div>
                
                <div class="benefit">
                    <div class="benefit-text">Quick responses = happy customers</div>
                </div>
                
                <div class="benefit">
                    <div class="benefit-text">Build trust through direct communication</div>
                </div>
            </div>
            
            <div class="question">
                Have you enabled<br>this yet? 🤔
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SPDigitalJourney — Digital Agency Bengaluru</title>
<meta name="description" content="SPDigitalJourney is a Bengaluru-based digital agency offering web design & development, SEO, branding, and digital marketing." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #03060f;
    --bg2: #060d1c;
    --blue-deep: #0a1628;
    --electric: #00d4ff;
    --electric2: #0066ff;
    --electric3: #7b2fff;
    --text: #e8f0ff;
    --muted: #5a6a8a;
    --card-bg: rgba(10,22,50,0.7);
    --border: rgba(0,212,255,0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; overflow-x: hidden; cursor: none; }

  /* CURSOR */
  .cursor { position: fixed; width: 12px; height: 12px; background: var(--electric); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: width .2s, height .2s; mix-blend-mode: screen; }
  .cursor-ring { position: fixed; width: 36px; height: 36px; border: 1px solid rgba(0,212,255,0.5); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: width .25s, height .25s, border-color .2s; }

  /* GRID BG */
  body::before { content:''; position:fixed; inset:0; z-index:0; background-image: linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px); background-size: 60px 60px; pointer-events:none; }

  /* NAV */
  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:1.2rem 4rem; background:rgba(3,6,15,.7); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }
  .nav-logo { font-family:'Orbitron',monospace; font-weight:800; font-size:1.1rem; letter-spacing:.05em; color:var(--electric); text-decoration:none; text-shadow:0 0 20px rgba(0,212,255,.5); }
  .nav-logo span { color:var(--text); }
  .nav-links { display:flex; gap:2.5rem; list-style:none; }
  .nav-links a { color:var(--muted); text-decoration:none; font-size:.82rem; letter-spacing:.12em; text-transform:uppercase; transition:color .2s; position:relative; }
  .nav-links a::after { content:''; position:absolute; bottom:-4px; left:0; width:0; height:1px; background:var(--electric); transition:width .3s; }
  .nav-links a:hover { color:var(--electric); }
  .nav-links a:hover::after { width:100%; }
  .nav-cta { background:transparent; border:1px solid var(--electric); color:var(--electric); padding:.55rem 1.4rem; font-family:'Orbitron',monospace; font-size:.72rem; letter-spacing:.12em; text-transform:uppercase; cursor:none; text-decoration:none; transition:background .3s, box-shadow .3s, color .3s; clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%); }
  .nav-cta:hover { background:var(--electric); color:var(--bg); box-shadow:0 0 30px rgba(0,212,255,.4); }

  section { position:relative; z-index:1; }

  /* HERO */
  #hero { min-height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:flex-start; padding:8rem 4rem 4rem; overflow:hidden; }
  .orb { position:absolute; border-radius:50%; filter:blur(80px); pointer-events:none; }
  .orb1 { width:600px; height:600px; background:rgba(0,102,255,.12); top:-100px; right:-100px; animation:orbFloat 8s ease-in-out infinite; }
  .orb2 { width:400px; height:400px; background:rgba(123,47,255,.10); bottom:50px; right:200px; animation:orbFloat 10s ease-in-out infinite reverse; }
  .orb3 { width:250px; height:250px; background:rgba(0,212,255,.08); top:200px; left:10%; animation:orbFloat 12s ease-in-out infinite; }
  @keyframes orbFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-30px)} }
  .hero-tag { font-family:'Orbitron',monospace; font-size:.68rem; letter-spacing:.3em; text-transform:uppercase; color:var(--electric); margin-bottom:1.5rem; display:flex; align-items:center; gap:.8rem; opacity:0; animation:fadeUp .8s .2s forwards; }
  .hero-tag::before { content:''; display:block; width:40px; height:1px; background:var(--electric); }
  .hero-title { font-family:'Orbitron',monospace; font-size:clamp(2.8rem,6vw,5.5rem); font-weight:900; line-height:1.05; margin-bottom:1.5rem; opacity:0; animation:fadeUp .8s .4s forwards; }
  .hero-title .line2 { color:transparent; -webkit-text-stroke:1px rgba(0,212,255,.5); }
  .hero-title .accent { color:var(--electric); text-shadow:0 0 40px rgba(0,212,255,.4); }
  .hero-sub { max-width:520px; font-size:1.05rem; line-height:1.7; color:var(--muted); margin-bottom:3rem; opacity:0; animation:fadeUp .8s .6s forwards; }
  .hero-btns { display:flex; gap:1rem; flex-wrap:wrap; opacity:0; animation:fadeUp .8s .8s forwards; }
  .btn-primary { background:linear-gradient(135deg,var(--electric2),var(--electric)); color:var(--bg); padding:.9rem 2.2rem; font-family:'Orbitron',monospace; font-size:.75rem; letter-spacing:.1em; text-transform:uppercase; border:none; cursor:none; text-decoration:none; clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%); font-weight:700; transition:box-shadow .3s,transform .2s; }
  .btn-primary:hover { box-shadow:0 0 40px rgba(0,212,255,.5); transform:translateY(-2px); }
  .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text); padding:.9rem 2.2rem; font-family:'Orbitron',monospace; font-size:.75rem; letter-spacing:.1em; text-transform:uppercase; cursor:none; text-decoration:none; clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%); transition:border-color .3s,color .3s; }
  .btn-ghost:hover { border-color:var(--electric); color:var(--electric); }
  .hero-scroll { position:absolute; bottom:2.5rem; left:4rem; display:flex; align-items:center; gap:.8rem; font-size:.7rem; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); opacity:0; animation:fadeUp .8s 1.2s forwards; }
  .scroll-line { width:40px; height:1px; background:var(--muted); position:relative; overflow:hidden; }
  .scroll-line::after { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:var(--electric); animation:scrollAnim 2s 1.5s ease-in-out infinite; }
  @keyframes scrollAnim { 0%{left:-100%} 50%{left:0} 100%{left:100%} }

  /* STATS */
  .stats-bar { padding:2.5rem 4rem; border-top:1px solid var(--border); border-bottom:1px solid var(--border); display:flex; flex-wrap:wrap; background:rgba(6,13,28,.6); }
  .stat { flex:1; min-width:150px; padding:1rem 2rem; border-right:1px solid var(--border); }
  .stat:last-child { border-right:none; }
  .stat-num { font-family:'Orbitron',monospace; font-size:2rem; font-weight:800; color:var(--electric); display:block; text-shadow:0 0 20px rgba(0,212,255,.3); }
  .stat-label { font-size:.75rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }

  /* SERVICES */
  #services { padding:7rem 4rem; }
  .section-label { font-family:'Orbitron',monospace; font-size:.65rem; letter-spacing:.35em; text-transform:uppercase; color:var(--electric); margin-bottom:1rem; display:flex; align-items:center; gap:.8rem; }
  .section-label::before { content:'//'; opacity:.5; }
  .section-title { font-family:'Orbitron',monospace; font-size:clamp(1.8rem,3.5vw,2.8rem); font-weight:800; margin-bottom:1rem; line-height:1.2; }
  .section-sub { color:var(--muted); max-width:480px; line-height:1.7; margin-bottom:4rem; font-size:.95rem; }
  .services-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1.5px; background:var(--border); }
  .service-card { background:var(--card-bg); padding:2.5rem; position:relative; overflow:hidden; transition:background .3s; backdrop-filter:blur(10px); }
  .service-card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(0,212,255,.04),transparent); opacity:0; transition:opacity .3s; }
  .service-card:hover { background:rgba(0,30,70,.85); }
  .service-card:hover::before { opacity:1; }
  .service-icon { width:52px; height:52px; margin-bottom:1.5rem; display:flex; align-items:center; justify-content:center; border:1px solid rgba(0,212,255,.2); font-size:1.4rem; clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%); background:rgba(0,212,255,.05); }
  .service-num { position:absolute; top:1.5rem; right:1.5rem; font-family:'Orbitron',monospace; font-size:.6rem; color:rgba(0,212,255,.2); letter-spacing:.1em; }
  .service-name { font-family:'Orbitron',monospace; font-size:.9rem; font-weight:600; letter-spacing:.05em; margin-bottom:.8rem; color:var(--text); }
  .service-desc { font-size:.88rem; color:var(--muted); line-height:1.7; }
  .service-line { position:absolute; bottom:0; left:0; height:2px; width:0; background:linear-gradient(90deg,var(--electric),var(--electric3)); transition:width .4s; }
  .service-card:hover .service-line { width:100%; }

  /* PORTFOLIO */
  #portfolio { padding:7rem 4rem; background:var(--bg2); }
  .portfolio-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5px; background:var(--border); }
  .port-card { background:var(--blue-deep); padding:3rem; position:relative; overflow:hidden; min-height:260px; display:flex; flex-direction:column; justify-content:flex-end; transition:background .3s; }
  .port-card.featured { grid-column:span 2; min-height:340px; }
  .port-card:hover { background:rgba(0,25,60,.95); }
  .port-bg { position:absolute; inset:0; background:linear-gradient(135deg,#0a1628,#081522); z-index:0; }
  .port-glow { position:absolute; width:300px; height:300px; border-radius:50%; filter:blur(80px); z-index:0; pointer-events:none; }
  .port-content { position:relative; z-index:1; }
  .port-tag { font-family:'Orbitron',monospace; font-size:.6rem; letter-spacing:.25em; text-transform:uppercase; color:var(--electric); margin-bottom:.8rem; display:block; }
  .port-title { font-family:'Orbitron',monospace; font-size:1.1rem; font-weight:600; margin-bottom:.5rem; }
  .port-card.featured .port-title { font-size:1.5rem; }
  .port-desc { font-size:.85rem; color:var(--muted); line-height:1.6; max-width:480px; }
  .port-link { display:inline-flex; align-items:center; gap:.5rem; margin-top:1.2rem; font-size:.75rem; letter-spacing:.1em; text-transform:uppercase; color:var(--electric); text-decoration:none; font-family:'Orbitron',monospace; transition:gap .2s; }
  .port-link:hover { gap:.9rem; }

  /* PROCESS */
  #process { padding:7rem 4rem; }
  .process-steps { display:grid; grid-template-columns:repeat(4,1fr); gap:0; margin-top:4rem; position:relative; }
  .process-steps::before { content:''; position:absolute; top:28px; left:12.5%; right:12.5%; height:1px; background:linear-gradient(90deg,transparent,var(--electric),transparent); }
  .process-step { text-align:center; padding:0 1.5rem; position:relative; z-index:1; }
  .step-dot { width:56px; height:56px; border:1px solid rgba(0,212,255,.3); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem; background:var(--bg); font-family:'Orbitron',monospace; font-size:.8rem; font-weight:800; color:var(--electric); position:relative; }
  .step-dot::after { content:''; position:absolute; inset:-4px; border-radius:50%; border:1px dashed rgba(0,212,255,.15); animation:spin 8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .step-title { font-family:'Orbitron',monospace; font-size:.78rem; font-weight:600; letter-spacing:.05em; margin-bottom:.6rem; }
  .step-desc { font-size:.82rem; color:var(--muted); line-height:1.65; }

  /* LEAD FUNNEL */
  #lead-funnel { padding:7rem 4rem; background:var(--bg2); position:relative; overflow:hidden; }
  #lead-funnel::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 65% 50%,rgba(0,212,255,.05),transparent 70%); }
  .funnel-wrap { display:grid; grid-template-columns:1fr 1fr; gap:5rem; align-items:center; position:relative; z-index:1; }
  .funnel-left h2 { font-family:'Orbitron',monospace; font-size:clamp(1.6rem,3vw,2.2rem); font-weight:800; line-height:1.25; margin-bottom:1rem; }
  .funnel-left p { color:var(--muted); line-height:1.7; margin-bottom:2rem; font-size:.95rem; }
  .funnel-steps { display:flex; flex-direction:column; gap:.8rem; }
  .funnel-step { display:flex; align-items:flex-start; gap:1rem; padding:1rem 1.2rem; border:1px solid var(--border); background:rgba(0,212,255,.02); clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%); }
  .fs-num { font-family:'Orbitron',monospace; font-size:.7rem; font-weight:800; color:var(--electric); min-width:24px; margin-top:2px; }
  .fs-text strong { display:block; font-size:.82rem; margin-bottom:.2rem; color:var(--text); }
  .fs-text span { font-size:.78rem; color:var(--muted); }
  .funnel-card { background:rgba(6,13,28,.85); border:1px solid var(--border); padding:2.5rem; backdrop-filter:blur(20px); clip-path:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%); }
  .funnel-card h3 { font-family:'Orbitron',monospace; font-size:.9rem; font-weight:700; color:var(--electric); margin-bottom:.4rem; }
  .funnel-card p { font-size:.8rem; color:var(--muted); margin-bottom:1.8rem; line-height:1.6; }
  .funnel-fields { display:flex; flex-direction:column; gap:.9rem; }
  .funnel-fields input, .funnel-fields select { background:rgba(10,22,50,.6); border:1px solid var(--border); color:var(--text); padding:.85rem 1rem; font-family:'DM Sans',sans-serif; font-size:.9rem; outline:none; width:100%; transition:border-color .2s; clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%); }
  .funnel-fields input:focus, .funnel-fields select:focus { border-color:rgba(0,212,255,.4); }
  .funnel-fields select option { background:#0a1628; }
  .wa-submit { width:100%; background:#25D366; border:none; color:#fff; padding:1rem; font-family:'Orbitron',monospace; font-size:.75rem; letter-spacing:.1em; text-transform:uppercase; font-weight:700; cursor:none; margin-top:.4rem; clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%); transition:box-shadow .3s,transform .2s; display:flex; align-items:center; justify-content:center; gap:.6rem; }
  .wa-submit:hover { box-shadow:0 0 30px rgba(37,211,102,.4); transform:translateY(-2px); }
  .funnel-note { font-size:.7rem; color:var(--muted); text-align:center; margin-top:.8rem; }

  /* BLOG */
  #blog { padding:7rem 4rem; }
  .blog-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.5px; background:var(--border); margin-top:3rem; }
  .blog-card { background:var(--card-bg); padding:2rem; position:relative; overflow:hidden; transition:background .3s; backdrop-filter:blur(10px); display:flex; flex-direction:column; }
  .blog-card:hover { background:rgba(0,25,60,.9); }
  .blog-date { font-family:'Orbitron',monospace; font-size:.58rem; letter-spacing:.2em; color:var(--electric); margin-bottom:.8rem; }
  .blog-title { font-size:.9rem; font-weight:500; line-height:1.5; margin-bottom:.8rem; color:var(--text); flex:1; }
  .blog-excerpt { font-size:.78rem; color:var(--muted); line-height:1.6; margin-bottom:1.2rem; }
  .blog-read { font-family:'Orbitron',monospace; font-size:.6rem; letter-spacing:.15em; text-transform:uppercase; color:var(--electric); text-decoration:none; transition:letter-spacing .2s; }
  .blog-read:hover { letter-spacing:.25em; }
  .blog-line { position:absolute; bottom:0; left:0; height:2px; width:0; background:linear-gradient(90deg,var(--electric),var(--electric3)); transition:width .4s; }
  .blog-card:hover .blog-line { width:100%; }
  .blog-cta { text-align:center; margin-top:2.5rem; }

  /* CONTACT */
  #contact { padding:7rem 4rem; }
  .contact-wrap { display:grid; grid-template-columns:1fr 1fr; gap:6rem; align-items:start; }
  .contact-info h2 { font-family:'Orbitron',monospace; font-size:clamp(1.6rem,3vw,2.4rem); font-weight:800; line-height:1.2; margin-bottom:1.2rem; }
  .contact-info p { color:var(--muted); line-height:1.7; margin-bottom:2rem; font-size:.95rem; }
  .contact-detail { display:flex; align-items:flex-start; gap:1rem; margin-bottom:1.2rem; }
  .cd-icon { width:36px; height:36px; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:.9rem; flex-shrink:0; clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%); background:rgba(0,212,255,.04); }
  .cd-text { font-size:.85rem; color:var(--muted); line-height:1.5; }
  .cd-text strong { display:block; color:var(--text); font-size:.78rem; letter-spacing:.08em; text-transform:uppercase; margin-bottom:.2rem; font-weight:400; font-family:'Orbitron',monospace; }
  .contact-form { display:flex; flex-direction:column; gap:1rem; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  .form-group { display:flex; flex-direction:column; gap:.4rem; }
  .form-group label { font-size:.65rem; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); font-family:'Orbitron',monospace; }
  .form-group input, .form-group textarea, .form-group select { background:rgba(10,22,50,.6); border:1px solid var(--border); color:var(--text); padding:.85rem 1rem; font-family:'DM Sans',sans-serif; font-size:.9rem; outline:none; transition:border-color .2s,box-shadow .2s; resize:none; clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%); }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:rgba(0,212,255,.4); box-shadow:0 0 20px rgba(0,212,255,.08); }
  .form-group select option { background:#0a1628; }
  .form-group textarea { min-height:110px; }
  .form-submit { background:linear-gradient(135deg,var(--electric2),var(--electric)); border:none; color:var(--bg); padding:1rem 2rem; font-family:'Orbitron',monospace; font-size:.75rem; letter-spacing:.12em; text-transform:uppercase; font-weight:700; cursor:none; width:100%; margin-top:.5rem; clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%); transition:box-shadow .3s,transform .2s; }
  .form-submit:hover { box-shadow:0 0 40px rgba(0,212,255,.4); transform:translateY(-2px); }

  /* FOOTER */
  footer { padding:2rem 4rem; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
  .footer-logo { font-family:'Orbitron',monospace; font-size:.9rem; font-weight:800; color:var(--electric); text-shadow:0 0 15px rgba(0,212,255,.3); }
  .footer-copy { font-size:.75rem; color:var(--muted); letter-spacing:.05em; }
  .footer-links { display:flex; gap:1.5rem; }
  .footer-links a { font-size:.72rem; color:var(--muted); text-decoration:none; letter-spacing:.1em; text-transform:uppercase; transition:color .2s; }
  .footer-links a:hover { color:var(--electric); }

  /* WHATSAPP FLOAT */
  .wa-float { position:fixed; bottom:2rem; right:2rem; z-index:200; display:flex; flex-direction:column; align-items:flex-end; gap:.6rem; }
  .wa-bubble { background:#25D366; color:#fff; width:58px; height:58px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.6rem; text-decoration:none; cursor:none; animation:waPulse 2.5s ease-in-out infinite; transition:transform .2s; }
  .wa-bubble:hover { transform:scale(1.1); }
  @keyframes waPulse { 0%,100%{box-shadow:0 4px 24px rgba(37,211,102,.4),0 0 0 0 rgba(37,211,102,.3)} 50%{box-shadow:0 4px 24px rgba(37,211,102,.4),0 0 0 12px rgba(37,211,102,0)} }
  .wa-label { background:rgba(3,6,15,.9); border:1px solid rgba(37,211,102,.3); color:#25D366; padding:.4rem .9rem; font-family:'Orbitron',monospace; font-size:.58rem; letter-spacing:.12em; whit

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status 12 - Checklist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }
        
        .status-container {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }
        
        .content {
            z-index: 10;
            width: 100%;
            color: white;
        }
        
        .header {
            text-align: center;
            margin-bottom: 70px;
        }
        
        .badge {
            background: #ffd700;
            color: #2d3436;
            padding: 25px 60px;
            border-radius: 50px;
            font-size: 48px;
            font-weight: 900;
            display: inline-block;
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.4);
        }
        
        .badge::before {
            content: '⭐ ';
            font-size: 56px;
        }
        
        .title {
            font-size: 88px;
            font-weight: 900;
            margin-top: 40px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .checklist-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 70px;
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
        }
        
        .checklist-item {
            display: flex;
            align-items: center;
            margin-bottom: 35px;
            padding: 35px 40px;
            background: white;
            border-left: 8px solid;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        
        .checklist-item:nth-child(odd) {
            border-color: #667eea;
        }
        
        .checklist-item:nth-child(even) {
            border-color: #764ba2;
        }
        
        .checkbox {
            width: 60px;
            height: 60px;
            border: 5px solid #667eea;
            border-radius: 10px;
            margin-right: 30px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
        }
        
        .item-text {
            font-size: 42px;
            color: #2d3436;
            font-weight: 600;
        }
        
        .question {
            text-align: center;
            margin-top: 70px;
        }
        
        .question-text {
            font-size: 68px;
            font-weight: 900;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .subtext {
            font-size: 48px;
            margin-top: 30px;
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="content">
            <div class="header">
                <div class="badge">The Complete Profile Checklist</div>
                <div class="title">How Many Can You Check Off?</div>
            </div>
            
            <div class="checklist-box">
                <div class="checklist-item">
                    <div class="checkbox">✅</div>
                    <div class="item-text">Business name & category</div>
                </div>
                
                <div class="checklist-item">
                    <div class="checkbox">✅</div>
                    <div class="item-text">Accurate address & hours</div>
                </div>
                
                <div class="checklist-item">
                    <div class="checkbox">✅</div>
                    <div class="item-text">Phone & website</div>
                </div>
                
                <div class="checklist-item">
                    <div class="checkbox">✅</div>
                    <div class="item-text">WhatsApp Business link</div>
                </div>
                
                <div class="checklist-item">
                    <div class="checkbox">✅</div>
                    <div class="item-text">Facebook page</div>
                </div>
                
                <div class="checklist-item">
                    <div class="checkbox">✅</div>
                    <div class="item-text">Instagram profile</div>
                </div>
                
                <div class="checklist-item">
                    <div class="checkbox">✅</div>
                    <div class="item-text">YouTube channel</div>
                </div>
                
                <div class="checklist-item">
                    <div class="checkbox">✅</div>
                    <div class="item-text">Regular posts & photos</div>
                </div>
                
                <div class="checklist-item">
                    <div class="checkbox">✅</div>
                    <div class="item-text">Respond to ALL reviews</div>
                </div>
            </div>
            
            <div class="question">
                <div class="question-text">Got them all? 🎯</div>
                <div class="subtext">If not, let's fix that!</div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status 6 - Real Results</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }
        
        .status-container {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }
        
        .content {
            text-align: center;
            z-index: 10;
            width: 100%;
            color: white;
        }
        
        .badge {
            background: white;
            color: #11998e;
            padding: 25px 60px;
            border-radius: 50px;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 60px;
            display: inline-block;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        
        .badge::before {
            content: '📊 ';
            font-size: 56px;
        }
        
        .title {
            font-size: 88px;
            font-weight: 900;
            margin-bottom: 70px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            font-size: 48px;
            margin-bottom: 80px;
            opacity: 0.95;
            font-weight: 600;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 80px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }
        
        .stat-icon {
            font-size: 80px;
            margin-bottom: 30px;
        }
        
        .stat-number {
            font-size: 100px;
            font-weight: 900;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 20px;
        }
        
        .stat-label {
            font-size: 38px;
            color: #2d3436;
            font-weight: 600;
            line-height: 1.3;
        }
        
        .warning {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        }
        
        .warning-text {
            font-size: 62px;
            font-weight: 900;
            color: #2d3436;
            line-height: 1.3;
        }
        
        .highlight {
            color: #11998e;
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="content">
            <div class="badge">Real Results</div>
            
            <div class="title">
                Complete Google Profiles<br>+ Social Links Get:
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-number">70%</div>
                    <div class="stat-label">more clicks</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">💬</div>
                    <div class="stat-number">3x</div>
                    <div class="stat-label">more customer messages</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">⭐</div>
                    <div class="stat-number">2x</div>
                    <div class="stat-label">more reviews</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">🎯</div>
                    <div class="stat-number">+10</div>
                    <div class="stat-label">Better local rankings</div>
                </div>
            </div>
            
            <div class="warning">
                <div class="warning-text">
                    Don't leave<br>
                    <span class="highlight">money</span><br>
                    on the table!
                </div>
            </div>
        </div>
    </div>
</body>
</html>

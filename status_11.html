<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status 11 - Instagram Power</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }
        
        .status-container {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }
        
        .content {
            text-align: center;
            z-index: 10;
            color: white;
        }
        
        .icons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-bottom: 60px;
        }
        
        .icon {
            font-size: 160px;
        }
        
        .plus {
            font-size: 100px;
            font-weight: 900;
        }
        
        .equals {
            font-size: 100px;
            font-weight: 900;
            margin: 40px 0;
        }
        
        .power-text {
            font-size: 88px;
            font-weight: 900;
            margin-bottom: 80px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .visual-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 70px;
            border-radius: 30px;
            margin: 40px 0;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
        }
        
        .visual-title {
            font-size: 52px;
            color: #2d3436;
            margin-bottom: 50px;
            font-weight: 700;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 50px;
        }
        
        .grid-item {
            padding: 40px;
            background: linear-gradient(135deg, #f09433 0%,#dc2743 50%,#bc1888 100%);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(240, 148, 51, 0.3);
        }
        
        .grid-icon {
            font-size: 70px;
            margin-bottom: 20px;
        }
        
        .grid-text {
            font-size: 40px;
            color: white;
            font-weight: 600;
            line-height: 1.3;
        }
        
        .auto-update {
            background: #ffd700;
            padding: 40px;
            border-radius: 20px;
            margin-top: 40px;
        }
        
        .auto-text {
            font-size: 48px;
            color: #2d3436;
            font-weight: 700;
        }
        
        .cta {
            font-size: 72px;
            font-weight: 900;
            margin-top: 70px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .highlight {
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="content">
            <div class="icons">
                <div class="icon">📸</div>
                <div class="plus">+</div>
                <div class="icon">🔍</div>
            </div>
            
            <div class="equals">=</div>
            
            <div class="power-text">
                Instagram + Google<br>
                = Visual Power! 🎨
            </div>
            
            <div class="visual-box">
                <div class="visual-title">Your Google listing can show:</div>
                
                <div class="grid">
                    <div class="grid-item">
                        <div class="grid-icon">📸</div>
                        <div class="grid-text">Instagram posts</div>
                    </div>
                    
                    <div class="grid-item">
                        <div class="grid-icon">🌟</div>
                        <div class="grid-text">Product photos</div>
                    </div>
                    
                    <div class="grid-item">
                        <div class="grid-icon">👥</div>
                        <div class="grid-text">Behind-the-scenes</div>
                    </div>
                    
                    <div class="grid-item">
                        <div class="grid-icon">💡</div>
                        <div class="grid-text">Customer stories</div>
                    </div>
                </div>
                
                <div class="auto-update">
                    <div class="auto-text">✨ All automatically updated! ✨</div>
                </div>
            </div>
            
            <div class="cta">
                <span class="highlight">SHOW</span>, don't just tell!
            </div>
        </div>
    </div>
</body>
</html>

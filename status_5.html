<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status 5 - Power of Integration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }
        
        .status-container {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }
        
        .content {
            text-align: center;
            z-index: 10;
            width: 100%;
        }
        
        .badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 60px;
            border-radius: 50px;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 60px;
            display: inline-block;
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
        }
        
        .badge::before {
            content: '⚡ ';
            font-size: 56px;
        }
        
        .title {
            font-size: 88px;
            font-weight: 900;
            color: #2d3436;
            margin-bottom: 90px;
            line-height: 1.2;
        }
        
        .diagram {
            background: white;
            padding: 70px;
            border-radius: 30px;
            margin: 40px 0;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2);
        }
        
        .search-bar {
            background: #f5f6fa;
            padding: 35px 50px;
            border-radius: 60px;
            font-size: 44px;
            color: #636e72;
            margin-bottom: 60px;
            border: 4px solid #dfe6e9;
            font-weight: 500;
        }
        
        .search-bar::before {
            content: '🔍 ';
            margin-right: 15px;
        }
        
        .arrow {
            font-size: 80px;
            color: #667eea;
            margin: 30px 0;
        }
        
        .results-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 60px;
            border-radius: 25px;
        }
        
        .result-title {
            font-size: 52px;
            color: white;
            margin-bottom: 45px;
            font-weight: 700;
        }
        
        .result-item {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px 40px;
            border-radius: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            font-size: 42px;
            color: #2d3436;
            font-weight: 600;
        }
        
        .result-item::before {
            content: '✨';
            margin-right: 25px;
            font-size: 48px;
        }
        
        .result-item:last-child {
            margin-bottom: 0;
        }
        
        .conclusion {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px;
            border-radius: 30px;
            margin-top: 70px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        }
        
        .conclusion-text {
            font-size: 68px;
            font-weight: 900;
            color: #2d3436;
            line-height: 1.3;
        }
        
        .highlight {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .trophy {
            font-size: 90px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="content">
            <div class="badge">The Power of Integration</div>
            
            <div class="title">
                When someone searches<br>your business on Google
            </div>
            
            <div class="diagram">
                <div class="search-bar">Your Business Name</div>
                
                <div class="arrow">⬇️</div>
                
                <div class="results-box">
                    <div class="result-title">They see ALL of this:</div>
                    <div class="result-item">Your Instagram feed</div>
                    <div class="result-item">Facebook reviews</div>
                    <div class="result-item">WhatsApp chat button</div>
                    <div class="result-item">YouTube videos</div>
                </div>
            </div>
            
            <div class="conclusion">
                <div class="conclusion-text">
                    All in <span class="highlight">ONE</span> place!<br>
                    That's how you<br>
                    <span class="highlight">WIN</span> online!
                </div>
                <div class="trophy">🏆</div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status 8 - Stop Losing Customers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }
        
        .status-container {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }
        
        .content {
            text-align: center;
            z-index: 10;
            color: white;
        }
        
        .warning-icon {
            font-size: 180px;
            margin-bottom: 50px;
            animation: shake 2s ease-in-out infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        
        .headline {
            font-size: 96px;
            font-weight: 900;
            margin-bottom: 60px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            line-height: 1.2;
        }
        
        .subheadline {
            font-size: 52px;
            margin-bottom: 80px;
            opacity: 0.95;
            font-weight: 600;
            line-height: 1.4;
        }
        
        .action-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 70px;
            border-radius: 30px;
            margin: 40px 0;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
        }
        
        .action-title {
            font-size: 56px;
            color: #2d3436;
            margin-bottom: 50px;
            font-weight: 900;
        }
        
        .action-title::before {
            content: '🔥 ';
        }
        
        .action-title::after {
            content: ' 🔥';
        }
        
        .action-item {
            display: flex;
            align-items: center;
            margin-bottom: 35px;
            padding: 35px 40px;
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            border-radius: 20px;
        }
        
        .action-item:last-child {
            margin-bottom: 0;
        }
        
        .action-item::before {
            content: '✅';
            font-size: 50px;
            margin-right: 30px;
        }
        
        .action-text {
            font-size: 44px;
            color: white;
            font-weight: 600;
        }
        
        .urgency {
            background: #ffd700;
            color: #2d3436;
            padding: 50px 80px;
            border-radius: 30px;
            margin-top: 80px;
            box-shadow: 0 20px 50px rgba(255, 215, 0, 0.4);
        }
        
        .urgency-text {
            font-size: 72px;
            font-weight: 900;
            line-height: 1.3;
        }
        
        .urgency-subtext {
            font-size: 48px;
            margin-top: 30px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="content">
            <div class="warning-icon">🔥</div>
            
            <div class="headline">
                STOP<br>LOSING<br>CUSTOMERS!
            </div>
            
            <div class="subheadline">
                Every day your Google profile<br>
                sits incomplete, you're sending<br>
                customers to competitors
            </div>
            
            <div class="action-box">
                <div class="action-title">Fix it TODAY</div>
                
                <div class="action-item">
                    <div class="action-text">Link all social media</div>
                </div>
                
                <div class="action-item">
                    <div class="action-text">Enable WhatsApp Business</div>
                </div>
                
                <div class="action-item">
                    <div class="action-text">Add recent photos</div>
                </div>
                
                <div class="action-item">
                    <div class="action-text">Respond to reviews</div>
                </div>
            </div>
            
            <div class="urgency">
                <div class="urgency-text">
                    Your business<br>deserves better!
                </div>
                <div class="urgency-subtext">Act NOW! ⚡</div>
            </div>
        </div>
    </div>
</body>
</html>

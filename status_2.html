<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status 2 - Common Mistake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }
        
        .status-container {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }
        
        .bg-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 35px,
                white 35px,
                white 70px
            );
        }
        
        .content {
            text-align: center;
            z-index: 10;
            color: white;
        }
        
        .badge {
            background: #ff4757;
            color: white;
            padding: 25px 60px;
            border-radius: 50px;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 60px;
            display: inline-block;
            box-shadow: 0 20px 40px rgba(255, 71, 87, 0.4);
        }
        
        .badge::before {
            content: '❌ ';
            font-size: 56px;
        }
        
        .title {
            font-size: 80px;
            font-weight: 900;
            margin-bottom: 80px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            line-height: 1.2;
        }
        
        .checklist {
            background: rgba(255, 255, 255, 0.95);
            padding: 70px;
            border-radius: 30px;
            margin: 40px 0;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            text-align: left;
        }
        
        .section {
            margin-bottom: 60px;
        }
        
        .section:last-child {
            margin-bottom: 0;
        }
        
        .section-title {
            font-size: 44px;
            color: #2d3436;
            margin-bottom: 35px;
            font-weight: 600;
        }
        
        .check-item {
            display: flex;
            align-items: center;
            font-size: 46px;
            color: #2d3436;
            margin-bottom: 25px;
            font-weight: 500;
        }
        
        .check-item::before {
            content: '✅';
            font-size: 50px;
            margin-right: 25px;
            flex-shrink: 0;
        }
        
        .forgot-section {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            padding: 50px;
            border-radius: 20px;
            margin-top: 50px;
        }
        
        .forgot-title {
            font-size: 48px;
            color: white;
            margin-bottom: 35px;
            font-weight: 700;
        }
        
        .social-item {
            display: flex;
            align-items: center;
            font-size: 44px;
            color: white;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .social-item::before {
            margin-right: 20px;
            flex-shrink: 0;
            font-size: 50px;
        }
        
        .whatsapp::before { content: '📱'; }
        .facebook::before { content: '📘'; }
        .instagram::before { content: '📸'; }
        .youtube::before { content: '▶️'; }
        
        .warning {
            font-size: 52px;
            font-weight: 700;
            margin-top: 70px;
            line-height: 1.4;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="bg-pattern"></div>
        
        <div class="content">
            <div class="badge">Common Mistake Alert!</div>
            
            <div class="title">
                You created your<br>Google Business Profile...
            </div>
            
            <div class="checklist">
                <div class="section">
                    <div class="section-title">What you did:</div>
                    <div class="check-item">Added address</div>
                    <div class="check-item">Added hours</div>
                </div>
                
                <div class="forgot-section">
                    <div class="forgot-title">But FORGOT to link:</div>
                    <div class="social-item whatsapp">WhatsApp</div>
                    <div class="social-item facebook">Facebook</div>
                    <div class="social-item instagram">Instagram</div>
                    <div class="social-item youtube">YouTube</div>
                </div>
            </div>
            
            <div class="warning">
                Customers can't find you<br>
                on their favorite platforms!
            </div>
        </div>
    </div>
</body>
</html>

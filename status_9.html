<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status 9 - Pro Tip</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }
        
        .status-container {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }
        
        .content {
            z-index: 10;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 70px;
        }
        
        .badge {
            background: white;
            color: #ff6a88;
            padding: 25px 60px;
            border-radius: 50px;
            font-size: 48px;
            font-weight: 900;
            display: inline-block;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        
        .badge::before {
            content: '💼 ';
            font-size: 56px;
        }
        
        .title {
            font-size: 72px;
            font-weight: 900;
            color: white;
            margin-top: 40px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .analogy-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 70px;
            border-radius: 30px;
            margin-bottom: 60px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
        }
        
        .analogy-title {
            font-size: 52px;
            color: #2d3436;
            margin-bottom: 50px;
            font-weight: 700;
            text-align: center;
        }
        
        .comparison {
            display: flex;
            gap: 40px;
            margin-top: 50px;
        }
        
        .col {
            flex: 1;
        }
        
        .col-title {
            font-size: 44px;
            font-weight: 700;
            margin-bottom: 35px;
            text-align: center;
            padding-bottom: 25px;
            border-bottom: 5px solid;
        }
        
        .physical {
            color: #00b894;
            border-color: #00b894;
        }
        
        .online {
            color: #0984e3;
            border-color: #0984e3;
        }
        
        .item {
            display: flex;
            align-items: center;
            font-size: 38px;
            color: #2d3436;
            margin-bottom: 25px;
            font-weight: 500;
        }
        
        .item::before {
            content: '❌';
            font-size: 44px;
            margin-right: 20px;
        }
        
        .question {
            background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%);
            padding: 60px;
            border-radius: 30px;
            text-align: center;
        }
        
        .question-text {
            font-size: 62px;
            color: white;
            font-weight: 900;
            line-height: 1.3;
        }
        
        .cta {
            text-align: center;
            margin-top: 70px;
        }
        
        .cta-button {
            background: #ffd700;
            color: #2d3436;
            padding: 45px 80px;
            border-radius: 50px;
            font-size: 64px;
            font-weight: 900;
            display: inline-block;
            box-shadow: 0 20px 50px rgba(255, 215, 0, 0.4);
        }
        
        .cta-button::after {
            content: ' 🚀';
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="content">
            <div class="header">
                <div class="badge">Pro Tip for Business Owners</div>
                <div class="title">Your Google Profile = Your FREE Digital Storefront</div>
            </div>
            
            <div class="analogy-box">
                <div class="analogy-title">Would you open a physical store with:</div>
                
                <div class="comparison">
                    <div class="col">
                        <div class="col-title physical">Physical Store</div>
                        <div class="item">No signage?</div>
                        <div class="item">No contact info?</div>
                        <div class="item">No way to browse?</div>
                    </div>
                    
                    <div class="col">
                        <div class="col-title online">Online Profile</div>
                        <div class="item">No social links?</div>
                        <div class="item">No WhatsApp?</div>
                        <div class="item">No updates?</div>
                    </div>
                </div>
                
                <div class="question">
                    <div class="question-text">
                        Then why do it<br>ONLINE?
                    </div>
                </div>
            </div>
            
            <div class="cta">
                <div class="cta-button">Complete your profile NOW!</div>
            </div>
        </div>
    </div>
</body>
</html>
